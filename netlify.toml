[build]
  command = "npm run build:netlify"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--prefer-offline"
  NPM_CONFIG_CACHE = ".npm-cache"
  ELEVENTY_ENV = "production"
  SITE_URL = "https://jcrt.org"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[[redirects]]
  from = "http://jcrt.org/oai"
  to = "https://jcrt.org/oai"
  status = 302
  force = true

[[redirects]]
  from = "http://jcrt.org/sitemaps/oai_dc.xml"
  to = "https://jcrt.org/sitemaps/oai_dc.xml"
  status = 302
  force = true

[[redirects]]
  from = "http://jcrt.org/sitemap/oai_dc.xml"
  to = "https://jcrt.org/sitemap/oai_dc.xml"
  status = 302
  force = true

[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = [".cache"]

[[edge_functions]]
  function = "oai-pmh"
  path = "/sitemaps/oai_dc.xml"

[[edge_functions]]
  function = "oai-pmh"
  path = "/sitemap/oai_dc.xml"

[[edge_functions]]
  function = "oai-pmh"
  path = "/oai"

[[edge_functions]]
  function = "archive-legacy-redirects"
  path = "/archives/*"

# Cache headers for static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Accept, Range"
    Access-Control-Expose-Headers = "Content-Length, Content-Range, ETag"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Accept, Range"
    Access-Control-Expose-Headers = "Content-Length, Content-Range, ETag"

[[headers]]
  for = "/images/logos/site.webmanifest"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Accept, Range"
