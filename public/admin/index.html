<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Whitestone Foundation CMS administration interface for managing JCRT pages, posts, archive records, authors, and publication metadata." />
    <meta name="robots" content="noindex, nofollow" />
    <title>Whitestone Foundation CMS | JCRT Content Administration</title>
	<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
	<link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">Whitestone Foundation CMS Administration</h1>
   <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
  </body>
</html>
