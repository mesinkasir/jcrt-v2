name: IndexNow Notify Bing

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: indexnow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SITE_URL: https://jcrt.org
      INDEXNOW_ENDPOINTS: https://api.indexnow.org/indexnow
      INDEXNOW_KEY: c1cf137ca1024d45a2c0308f2468052e
      INDEXNOW_KEY_LOCATION: https://jcrt.org/c1cf137ca1024d45a2c0308f2468052e.txt
      # Force full sitemap URL announcements so modified pages are also announced.
      INDEXNOW_SUBMIT_ALL: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          CONTEXT: production
          BRANCH: ${{ github.ref_name }}
          COMMIT_REF: ${{ github.sha }}
          CACHED_COMMIT_REF: ${{ github.event.before }}
        run: npm run build:netlify

      - name: Submit URL announcements to IndexNow
        run: npm run indexnow:submit
